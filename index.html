<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#009C3B"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>
<meta name="apple-mobile-web-app-title" content="Bolão 2026"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Bolão Copa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --vd:#009C3B;--vde:#006B29;--am:#FFDF00;--ame:#E6C800;--az:#002776;
  --bg:#F0F2F0;--cb:#E0E0E0;--ct:#666;--wh:#fff;
  --sh:0 2px 10px rgba(0,0,0,.08);--shf:0 6px 24px rgba(0,0,0,.15);
  --r:16px;--rs:10px;
}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--bg);color:#222;overflow-x:hidden}
#root{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);position:relative}

/* Loading */
#splash{position:fixed;inset:0;background:var(--vd);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#splash.hide{opacity:0;pointer-events:none}
.splash-emoji{font-size:64px;animation:bounce 1s ease-in-out infinite alternate}
.splash-title{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--am);letter-spacing:2px;margin-top:16px}
.splash-sub{font-size:14px;color:rgba(255,255,255,.7);margin-top:8px}
.splash-spin{width:28px;height:28px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin-top:24px}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* Header */
.hd{background:var(--vd);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--am);letter-spacing:1px;line-height:1;display:flex;align-items:center;gap:8px}
.logo-sub{color:rgba(255,255,255,.8);font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:500;display:block;letter-spacing:2px;line-height:1}
.av-sm{width:34px;height:34px;border-radius:50%;background:var(--am);color:var(--vde);font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.4);cursor:pointer}
.btn-sair{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:13px;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:'Barlow',sans-serif}
.btn-sair:hover{background:rgba(255,255,255,.25)}

/* Auth */
.hero{background:var(--vd);padding:48px 24px 40px;text-align:center;position:relative;overflow:hidden;flex-shrink:0}
.hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(0,0,0,.04) 20px,rgba(0,0,0,.04) 40px)}
.hero-badge{display:inline-block;background:var(--am);color:var(--vde);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:2px;padding:4px 12px;border-radius:20px;margin-bottom:16px;position:relative}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:52px;color:#fff;letter-spacing:2px;line-height:1;position:relative}
.hero-title em{color:var(--am);font-style:normal}
.hero-sub{color:rgba(255,255,255,.75);font-size:15px;margin-top:8px;position:relative}
.hero-emoji{font-size:42px;display:block;margin-bottom:12px;position:relative}
.auth-card{background:#fff;border-radius:var(--r) var(--r) 0 0;margin-top:-20px;padding:28px 24px 40px;flex:1;box-shadow:0 -4px 24px rgba(0,0,0,.08)}
.tabs{display:flex;margin-bottom:24px;border-radius:var(--rs);overflow:hidden;border:1.5px solid var(--vd)}
.tab{flex:1;padding:10px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;background:transparent;color:var(--vd);border:none}
.tab.on{background:var(--vd);color:#fff}

/* Forms */
.fg{margin-bottom:16px}
.fl{font-size:13px;font-weight:600;color:var(--ct);margin-bottom:6px;display:block;letter-spacing:.5px}
.fi{width:100%;padding:12px 14px;border:1.5px solid var(--cb);border-radius:var(--rs);font-family:'Barlow',sans-serif;font-size:15px;color:#222;transition:border-color .2s;background:#fff;outline:none}
.fi:focus{border-color:var(--vd);box-shadow:0 0 0 3px rgba(0,156,59,.12)}
.fi::placeholder{color:#bbb}
.err-box{background:#fff5f5;border:1px solid #fed7d7;color:#c53030;padding:10px 14px;border-radius:8px;font-size:14px;margin:10px 0}
.ok-box{background:#f0fff4;border:1px solid #9ae6b4;color:#276749;padding:10px 14px;border-radius:8px;font-size:14px;margin:10px 0}
.warn-box{background:#fffde7;border:1px solid #ffe082;color:#e65100;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.6;margin:10px 0}
.info-box{background:#e3f2fd;border:1px solid #90caf9;color:#1565c0;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.6;margin:10px 0}

/* Buttons */
.btn-p{width:100%;padding:14px;background:var(--vd);color:#fff;border:none;border-radius:var(--rs);font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:background .2s,transform .1s;margin-top:8px;display:block}
.btn-p:hover{background:var(--vde)}.btn-p:active{transform:scale(.98)}.btn-p:disabled{background:#ccc;cursor:not-allowed}
.btn-am{width:100%;padding:14px;background:var(--am);color:var(--vde);border:none;border-radius:var(--rs);font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:1.5px;cursor:pointer;margin-top:8px;display:block}
.btn-am:hover{background:var(--ame)}
.btn-sm{padding:8px 16px;background:var(--vd);color:#fff;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.btn-sm:hover{background:var(--vde)}.btn-sm:disabled{background:#ccc;cursor:not-allowed}
.btn-sm-red{padding:8px 16px;background:#e53e3e;color:#fff;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.btn-sm-gray{padding:7px 14px;background:#f0f0f0;color:#555;border:1px solid #ddd;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--az);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;padding:10px 24px;border-radius:30px;z-index:500;box-shadow:0 4px 20px rgba(0,0,0,.25);white-space:nowrap;pointer-events:none;animation:toastIn .25s,toastOut .3s 1.8s forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(10px)}}

/* Modal */
.mo-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.mo{background:#fff;border-radius:var(--r) var(--r) 0 0;width:100%;max-width:430px;padding:24px 24px 36px;animation:slideUp .25s cubic-bezier(.16,1,.3,1);max-height:92vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.mo-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mo-t{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--vd);letter-spacing:1px}
.mo-x{width:32px;height:32px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:#666}

/* Page */
.pg{padding:16px 14px 80px;flex:1;overflow-y:auto}
.sec{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--ct);text-transform:uppercase;margin-bottom:12px}
.pbar{height:5px;background:#e0e0e0;border-radius:3px;overflow:hidden}
.pfill{height:100%;background:var(--vd);border-radius:3px;transition:width .4s}

/* Dashboard */
.gb{background:var(--vd);border-radius:var(--r);padding:18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.gb::after{content:'⚽';position:absolute;right:16px;bottom:-8px;font-size:64px;opacity:.12}
.av-lg{width:48px;height:48px;border-radius:50%;background:var(--am);color:var(--vde);font-weight:700;font-size:20px;display:flex;align-items:center;justify-content:center;border:3px solid rgba(255,255,255,.3);flex-shrink:0}
.gt h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:#fff}
.gt p{font-size:12px;color:rgba(255,255,255,.7);margin-top:2px}
.ag-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.ag-card{background:#fff;border-radius:var(--r);padding:16px 12px;text-align:center;box-shadow:var(--sh);border:1.5px solid var(--cb);cursor:pointer;transition:all .15s}
.ag-card:hover{transform:translateY(-2px);box-shadow:var(--shf);border-color:var(--vd)}
.ag-card .icon{font-size:26px;margin-bottom:6px}
.ag-card .lbl{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:#222}
.ag-card .sub{font-size:11px;color:#999;margin-top:2px}
.gl{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.gc{background:#fff;border-radius:var(--r);padding:14px;box-shadow:var(--sh);border:1.5px solid var(--cb);cursor:pointer;transition:transform .15s,box-shadow .15s}
.gc:hover{transform:translateY(-2px);box-shadow:var(--shf)}
.gc-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.gc-n{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;color:#222}
.badge-adm{background:var(--am);color:var(--vde);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px}
.badge-m{background:#e8f5e9;color:var(--vde);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px}
.cp{background:#f0f0f0;color:#444;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;padding:4px 10px;border-radius:6px;letter-spacing:2px;cursor:pointer;transition:background .2s;display:inline-flex;align-items:center;gap:5px}
.cp:hover{background:var(--am);color:var(--vde)}
.empty{text-align:center;padding:36px 20px;background:#fff;border-radius:var(--r);border:2px dashed var(--cb)}
.empty p{font-size:13px;color:#999;margin-top:8px}

/* Group nav */
.gn-bar{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.15);overflow-x:auto}
.gn-bar::-webkit-scrollbar{display:none}
.gn-btn{flex-shrink:0;padding:11px 10px;background:none;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;color:rgba(255,255,255,.6);border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.gn-btn.on{color:var(--am);border-bottom-color:var(--am)}
.back-btn{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.8);font-size:14px;font-weight:600;background:none;border:none;cursor:pointer;padding:12px 0 0;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}

/* Filter */
.fbar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}
.fbar::-webkit-scrollbar{display:none}
.fbtn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--cb);background:#fff;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;color:#555;white-space:nowrap}
.fbtn.on{background:var(--vd);color:#fff;border-color:var(--vd)}

/* Fase header */
.fhd{background:var(--vd);border-radius:var(--rs);padding:9px 14px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.fhd h3{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--am);letter-spacing:1px}
.fhd span{font-size:11px;color:rgba(255,255,255,.6);margin-left:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.gtag{background:var(--am);color:var(--vde);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:1px;flex-shrink:0}
.ktag{background:var(--az);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:1px;flex-shrink:0}

/* Jogo card */
.jc{background:#fff;border-radius:var(--rs);margin-bottom:9px;border:1.5px solid var(--cb);overflow:hidden;transition:box-shadow .15s}
.jc.live-border{border-color:#e53e3e;box-shadow:0 0 0 2px rgba(229,62,62,.2)}
.jc-h{padding:7px 12px;background:#f8f8f8;border-bottom:1px solid var(--cb);display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
.jmeta{font-size:11px;color:#999;font-weight:600}
.st-ab{background:#e8f5e9;color:#2e7d32;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;font-family:'Barlow Condensed',sans-serif}
.st-fc{background:#fce4ec;color:#c62828;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;font-family:'Barlow Condensed',sans-serif}
.st-br{background:#fff3e0;color:#e65100;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;font-family:'Barlow Condensed',sans-serif}
.st-lv{background:#ffebee;color:#c62828;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.jb{padding:11px 12px}
.jt{display:flex;align-items:center;gap:6px}
.tn{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:#222;line-height:1.2}
.tn.r{text-align:right}
.tf{font-size:20px}
.jvs{font-family:'Bebas Neue',sans-serif;font-size:17px;color:#ddd;flex-shrink:0;padding:0 4px}
.res-box{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;padding:6px 10px;background:#f0f9f4;border-radius:8px;border:1px solid #c8e6c9}
.res-placar{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--vd);letter-spacing:4px}
.live-box{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;padding:6px 10px;background:#fff5f5;border-radius:8px;border:1px solid #ffcdd2}
.live-box .sc{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#c62828;letter-spacing:4px}
.pr{display:flex;align-items:center;gap:8px;margin-top:10px}
.plbl{font-size:11px;color:#999;font-weight:700;flex-shrink:0;letter-spacing:.5px}
.si-wrap{display:flex;align-items:center;gap:6px;flex:1;justify-content:center}
.si{width:48px;height:40px;text-align:center;border:1.5px solid var(--cb);border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--vd);background:#fff;outline:none;transition:border-color .2s}
.si:focus{border-color:var(--vd);box-shadow:0 0 0 3px rgba(0,156,59,.12)}
.si:disabled{background:#f5f5f5;color:#ccc;cursor:not-allowed}
.ssep{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#ccc}
.bsv{padding:7px 14px;background:var(--vd);color:#fff;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0;transition:background .2s}
.bsv:hover{background:var(--vde)}.bsv:disabled{background:#ccc;cursor:not-allowed}
.psv{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--vd);font-weight:700;display:flex;align-items:center;gap:4px;flex-shrink:0}
.p7{background:#fff9c4;color:#f57f17;font-size:12px;font-weight:700;padding:2px 7px;border-radius:8px;font-family:'Barlow Condensed',sans-serif}
.p2{background:#e8f5e9;color:#2e7d32;font-size:12px;font-weight:700;padding:2px 7px;border-radius:8px;font-family:'Barlow Condensed',sans-serif}
.p0{background:#fce4ec;color:#c62828;font-size:12px;font-weight:700;padding:2px 7px;border-radius:8px;font-family:'Barlow Condensed',sans-serif}

/* Ranking */
.rk{background:#fff;border-radius:var(--r);overflow:hidden;border:1.5px solid var(--cb);box-shadow:var(--sh)}
.rk-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--cb);cursor:pointer;transition:background .15s}
.rk-row:last-child{border-bottom:none}
.rk-row:hover{background:#f9f9f9}
.rk-row.eu{background:#fffde7}
.rk-pos{width:28px;font-family:'Bebas Neue',sans-serif;font-size:20px;color:#ccc;text-align:center;flex-shrink:0}
.g1{color:#FFD700}.g2{color:#C0C0C0}.g3{color:#CD7F32}
.rk-av{width:36px;height:36px;border-radius:50%;background:var(--vd);color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rk-av.eu{background:var(--am);color:var(--vde)}
.rk-pts{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--vd);flex-shrink:0}
.rk-nm{font-weight:600;font-size:15px}
.rk-sb{font-size:11px;color:#999}
.delta-up{color:#2e7d32;font-size:12px;font-weight:700;font-family:'Barlow Condensed',sans-serif}
.delta-dn{color:#c62828;font-size:12px;font-weight:700;font-family:'Barlow Condensed',sans-serif}
.delta-eq{color:#999;font-size:12px;font-weight:700}

/* AoVivo */
.live-dot{width:10px;height:10px;border-radius:50%;background:#ff5252;display:inline-block;margin-right:6px;animation:pulse 1s infinite}
.live-card{background:#fff;border-radius:var(--r);margin-bottom:14px;overflow:hidden;border:2px solid #ef9a9a}
.live-card-h{background:linear-gradient(135deg,#c62828,#b71c1c);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.palp-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1.5px solid var(--cb);background:#fafafa;margin-bottom:6px}
.palp-row.ex{background:#f0fff4;border-color:#66bb6a}
.palp-row.vn{background:#fffde7;border-color:#ffd54f}
.palp-row.er{background:#fff5f5;border-color:#ef9a9a}
.mini-av{width:30px;height:30px;border-radius:50%;background:var(--vd);color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mini-av.eu{background:var(--am);color:var(--vde)}

/* Especiais */
.eq{background:#fff;border-radius:var(--r);margin-bottom:14px;border:1.5px solid var(--cb);overflow:hidden}
.eq-h{padding:13px 16px;background:linear-gradient(135deg,var(--az),#0033aa);display:flex;align-items:flex-start;gap:10px}
.eq-n{width:26px;height:26px;border-radius:50%;background:var(--am);color:var(--az);font-family:'Bebas Neue',sans-serif;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.eq-t{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;color:#fff;line-height:1.4}
.eq-p{font-size:11px;color:var(--am);font-weight:700;margin-top:2px}
.eq-o{padding:12px 16px;display:flex;flex-direction:column;gap:7px}
.opbtn{padding:10px 14px;border:1.5px solid var(--cb);border-radius:8px;background:#fff;font-family:'Barlow',sans-serif;font-size:14px;color:#333;cursor:pointer;transition:all .15s;text-align:left;width:100%}
.opbtn:hover:not(:disabled){border-color:var(--vd);background:#f0fff4}
.opbtn.on{border-color:var(--vd);background:#e8f5e9;color:var(--vde);font-weight:600}
.opbtn.correto{border-color:#2e7d32;background:#e8f5e9;color:#1b5e20;font-weight:700}
.opbtn.errado{border-color:#c62828;background:#ffebee;color:#c62828}
.opbtn:disabled{cursor:not-allowed;opacity:.7}

/* Admin */

// Join group by code
const fbJoinGroup = async (code, user) => {
  const q = query(collection(db,"groups"), where("code","==",code.toUpperCase().trim()));
  const snap = await getDocs(q);
  if (snap.empty) throw new Error("Código de convite inválido.");
  const gDoc = snap.docs[0];
  const group = gDoc.data();
  if (group.members.some(m => m.userId === user.uid)) throw new Error("Você já participa deste bolão.");
  await updateDoc(gDoc.ref, {
    members: arrayUnion({userId:user.uid, apelido:user.displayName, joinedAt:Date.now(), isOwner:false})
  });
  return { id: gDoc.id, ...group };
};

// Listen to user groups
const useUserGroups = (uid) => {
  const [groups, setGroups] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!uid) return;
    const q = query(collection(db,"groups"), where("members","array-contains",{userId:uid,apelido:"",joinedAt:0,isOwner:false}));
    // Firestore array-contains doesn't support partial objects — use a simpler approach:
    // listen to ALL groups and filter client-side (works for small groups)
    const unsub = onSnapshot(collection(db,"groups"), snap => {
      const all = snap.docs.map(d => ({id:d.id,...d.data()}));
      setGroups(all.filter(g => g.members?.some(m => m.userId === uid)));
      setLoading(false);
    });
    return unsub;
  }, [uid]);
  return { groups, loading };
};

// Compute total pts for a user
const computeTotalPts = (userId, palpites, results, especiais, gabarito) => {
  let pts = 0;
  TODOS_JOGOS.forEach(j => {
    const p = palpites.find(pp => pp.userId===userId && pp.jogoId===j.id);
    const r = results[j.id];
    if (p && r) pts += calcPts(p,r) || 0;
  });
  PERGUNTAS.forEach(p => {
    const e = especiais.find(ee => ee.userId===userId && ee.pergId===p.id);
    if (e && gabarito[p.id] && e.resposta===gabarito[p.id]) pts += 20;
  });
  return pts;
};

const calcFundo = (group, payments) => {
  const cfg = group?.financeConfig;
  if (!cfg) return 0;
  const pagantes = Object.values(payments).filter(p=>p.pago).length;
  return pagantes * (cfg.taxaEntrada||0);
};
const calcPremiosArr = (group, fundo) => {
  const cfg = group?.financeConfig;
  if (!cfg?.distribuicao) return [];
  return cfg.distribuicao.map((d,i) => ({
    pos:i+1, pct:d.pct, valor:Math.round(fundo*d.pct/100*100)/100
  }));
};

  const set=(k,v)=>{setForm(f=>({...f,[k]:v}));setErrs(e=>({...e,[k]:""}));setFb(null)};

  const validate=()=>{
    const e={};
    if(!form.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/))e.email="E-mail inválido";
    if(form.password.length<6)e.password="Mínimo 6 caracteres";
    if(tab==="reg"){
      if(!form.apelido.trim()||form.apelido.length<2)e.apelido="Apelido muito curto";
      if(form.password!==form.conf)e.conf="Senhas não coincidem";
    }
    setErrs(e);return!Object.keys(e).length;
  };

  const submit=async()=>{
    if(!validate())return;
    setBusy(true);setFb(null);
    try{
      if(tab==="login"){
        const cred=await fbLogin(form.email,form.password);
        onLogin(cred.user);
      } else {
        const user=await fbRegister(form.email,form.password,form.apelido.trim());
        onLogin(user);
      }
    } catch(err){
      const msgs={
        "auth/email-already-in-use":"E-mail já cadastrado.",
        "auth/invalid-credential":"E-mail ou senha incorretos.",
        "auth/user-not-found":"E-mail não encontrado.",
        "auth/wrong-password":"Senha incorreta.",
        "auth/weak-password":"Senha muito fraca (mínimo 6 caracteres).",
        "auth/too-many-requests":"Muitas tentativas. Aguarde alguns minutos.",
      };
      setFb(msgs[err.code]||err.message||"Erro desconhecido.");
    }
    setBusy(false);
  };

  const e=React.createElement;
  return e("div",{style:{display:"flex",flexDirection:"column",minHeight:"100vh"}},
    e("div",{className:"hero"},
      e("span",{className:"hero-emoji"},"🏆"),
      e("div",{className:"hero-badge"},"COPA DO MUNDO 2026"),
      e("div",{className:"hero-title"},e("span",null,"BOLÃO"),e("br"),e("em",null,"BRASIL")),
      e("div",{className:"hero-sub"},"Dispute com seus amigos e torça pelo hexa!")
    ),
    e("div",{className:"auth-card"},
      e("div",{className:"tabs"},
        e("button",{className:`tab${tab==="login"?" on":""}`,onClick:()=>{setTab("login");setFb(null);setErrs({})}},"ENTRAR"),
        e("button",{className:`tab${tab==="reg"?" on":""}`,onClick:()=>{setTab("reg");setFb(null);setErrs({})}},"CADASTRAR")
      ),
      tab==="reg"&&e(FInput,{label:"Apelido",type:"text",placeholder:"Como quer ser chamado?",value:form.apelido,onChange:ev=>set("apelido",ev.target.value),error:errs.apelido,maxLength:20,autoFocus:true}),
      e(FInput,{label:"E-mail",type:"email",placeholder:"seu@email.com",value:form.email,onChange:ev=>set("email",ev.target.value),error:errs.email,autoFocus:tab==="login"}),
      e(FInput,{label:"Senha",type:"password",placeholder:tab==="login"?"Sua senha":"Mínimo 6 caracteres",value:form.password,onChange:ev=>set("password",ev.target.value),error:errs.password,onKeyDown:ev=>ev.key==="Enter"&&submit()}),
      tab==="reg"&&e(FInput,{label:"Confirmar senha",type:"password",placeholder:"Repita a senha",value:form.conf,onChange:ev=>set("conf",ev.target.value),error:errs.conf,onKeyDown:ev=>ev.key==="Enter"&&submit()}),
      fb&&e("div",{className:"err-box"},fb),
      e("button",{className:"btn-p",onClick:submit,disabled:busy},
        busy?e(Spinner,{size:20}):tab==="login"?"ENTRAR":"CRIAR CONTA"
      )
    )
  );
}

// JOGO CARD
// ════════════════════════════════════════════════════════════════════════════
function JogoCard({jogo,user,groupId,palpites,results,now}){
  const deadline=jogo.kickoff-30*60*1000;
  const aberto=now<deadline;
  const breve=!aberto&&now<jogo.kickoff;
  const resultado=results[jogo.id]||null;
  const isLive=resultado?.status==="live";
  const isFinal=resultado?.status==="final";
  const myPalpite=palpites.find(p=>p.userId===user.uid&&p.jogoId===jogo.id);
  const [ca,setCa]=useState(myPalpite?String(myPalpite.casa):"");
  const [fo,setFo]=useState(myPalpite?String(myPalpite.fora):"");
  const [saved,setSaved]=useState(!!myPalpite);
  const [busy,setBusy]=useState(false);

  // Sync if external palpite comes in
  useEffect(()=>{
    if(myPalpite){setCa(String(myPalpite.casa));setFo(String(myPalpite.fora));setSaved(true);}
  },[myPalpite?.savedAt]);

  const pts=(resultado&&saved&&ca!==""&&fo!=="")? calcPts({casa:+ca,fora:+fo},resultado):null;

  const save=async()=>{
    if(ca.length<1||fo.length<1||isNaN(+ca)||isNaN(+fo))return;
    setBusy(true);
    try{await fbSavePalpite(user.uid,groupId,jogo.id,+ca,+fo);setSaved(true);}
    catch(e){console.error(e);}
    setBusy(false);
  };

  const dtStr=new Date(jogo.kickoff).toLocaleDateString("pt-BR",{day:"2-digit",month:"short",timeZone:"America/Sao_Paulo"});
  const hrStr=new Date(jogo.kickoff).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",timeZone:"America/Sao_Paulo"});
  const e=React.createElement;

  return e("div",{className:`jc${isLive?" live-border":""}`},
    e("div",{className:"jc-h"},
      e("div",{style:{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}},
        jogo.grupo&&e("span",{className:"gtag"},`Grupo ${jogo.grupo}·R${jogo.rodada}`),
        jogo.label&&e("span",{className:"ktag"},jogo.label),
        e("span",{className:"jmeta"},`${dtStr} ${hrStr}`)
      ),
      e("span",{className:aberto?"st-ab":breve?"st-br":isLive?"st-lv":"st-fc"},
        aberto?"✓ Aberto":breve?"⏳ Breve":isLive?"● AO VIVO":"🔒"
      )
    ),
    e("div",{className:"jb"},
      e("div",{className:"jt"},
        e("div",{style:{flex:1,display:"flex",alignItems:"center",gap:6}},
          e("span",{className:"tf"},FLAGS[jogo.casa]||"🏳️"),
          e("span",{className:"tn"},jogo.casa)
        ),
        e("span",{className:"jvs"},"VS"),
        e("div",{style:{flex:1,display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end"}},
          e("span",{className:"tn r"},jogo.fora),
          e("span",{className:"tf"},FLAGS[jogo.fora]||"🏳️")
        )
      ),
      isLive&&resultado&&e("div",{className:"live-box"},
        e("span",{style:{fontSize:10,fontWeight:700,color:"#c62828",letterSpacing:1}},"⚡ AO VIVO"),
        e("span",{className:"sc"},`${resultado.casa}–${resultado.fora}`)
      ),
      isFinal&&resultado&&e("div",{className:"res-box"},
        e("div",null,
          e("div",{style:{fontSize:10,fontWeight:700,color:"var(--vd)",letterSpacing:1,marginBottom:2}},"RESULTADO FINAL"),
          e("div",{className:"res-placar"},`${resultado.casa}–${resultado.fora}`)
        )
      ),
      e("div",{className:"pr"},
        e("span",{className:"plbl"},"🎯 PALPITE"),
        e("div",{className:"si-wrap"},
          e("input",{className:"si",type:"number",min:0,max:20,value:ca,onChange:ev=>{setCa(ev.target.value);setSaved(false)},disabled:!aberto,placeholder:"-"}),
          e("span",{className:"ssep"},"×"),
          e("input",{className:"si",type:"number",min:0,max:20,value:fo,onChange:ev=>{setFo(ev.target.value);setSaved(false)},disabled:!aberto,placeholder:"-"})
        ),
        aberto?e("button",{className:"bsv",onClick:save,disabled:busy||ca.length<1||fo.length<1},busy?"...":saved?"Salvo":"Salvar")
        :saved?e("span",{className:"psv"},
          "✓ ",
          pts!==null&&e("span",{className:pts===7?"p7":pts===2?"p2":"p0"},pts===7?"7pts ⭐":pts===2?"2pts ✓":"0pts ✗"),
          pts===null&&e("span",{style:{fontSize:11,color:"#aaa"}},"aguardando")
        )
        :e("span",{style:{fontSize:12,color:"#ccc",flexShrink:0}},"sem palpite")
      )
    )
  );
}

// JOGOS SCREEN
// ════════════════════════════════════════════════════════════════════════════
function JogosScreen({user,group,palpites,results}){
  const isAmistosos = group.tipo === "amistosos";
  const [filtro,setFiltro]=useState(isAmistosos?"amistoso":"grupos");
  const [now,setNow]=useState(Date.now());
  useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),15000);return()=>clearInterval(t);},[]);

  const JOGOS_ATIVOS = isAmistosos ? TODOS_JOGOS_AMISTOSOS : TODOS_JOGOS;
  const JOGOS_FG_ATIVOS = isAmistosos ? TODOS_JOGOS_AMISTOSOS : JOGOS_FG;
  const JOGOS_MM_ATIVOS = isAmistosos ? [] : JOGOS_MM;

  const feitosFG=JOGOS_FG_ATIVOS.filter(j=>palpites.some(p=>p.userId===user.uid&&p.jogoId===j.id)).length;
  const feitosMM=JOGOS_MM_ATIVOS.filter(j=>palpites.some(p=>p.userId===user.uid&&p.jogoId===j.id)).length;
  const total=JOGOS_ATIVOS.length;

  const FILTROS=isAmistosos?[
    {k:"amistoso",l:"Amistosos"},
  ]:[
    {k:"grupos",l:"Fase de Grupos"},{k:"oitavas",l:"Oitavas"},
    {k:"quartas",l:"Quartas"},{k:"semifinais",l:"Semis"},
    {k:"terceiro",l:"3º Lugar"},{k:"final",l:"🏆 Final"},
  ];
  const FASE_LABELS={oitavas:"⚔️ OITAVAS",quartas:"🏟️ QUARTAS",semifinais:"🌟 SEMIFINAIS",terceiro:"🥉 3º LUGAR",final:"🏆 GRANDE FINAL",amistoso:"🏟️ AMISTOSOS"};
  const e=React.createElement;

  return e("div",{style:{flex:1,overflowY:"auto",paddingBottom:80}},
    e("div",{style:{background:"var(--vd)",padding:"12px 14px 14px"}},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:8}},
        e("div",null,
          e("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:13,color:"rgba(255,255,255,.6)",letterSpacing:2}},"PALPITES"),
          e("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:"#fff",lineHeight:1}},
            `${feitosFG+feitosMM}`,e("span",{style:{fontSize:14,color:"rgba(255,255,255,.5)"}},`/${total}`)
          )
        ),
        e("div",{style:{textAlign:"right",fontSize:12,color:"rgba(255,255,255,.6)"}},
          e("div",null,`Grupos: ${feitosFG}/${JOGOS_FG.length}`),
          e("div",null,`Mata-mata: ${feitosMM}/${JOGOS_MM_ATIVOS.length}`)
        )
      ),
      e("div",{className:"pbar",style:{background:"rgba(255,255,255,.2)"}},
        e("div",{className:"pfill",style:{background:"var(--am)",width:`${Math.round(((feitosFG+feitosMM)/total)*100)}%`}})
      )
    ),
    e("div",{style:{padding:"12px 14px 0"}},
      e("div",{className:"fbar"},FILTROS.map(f=>e("button",{key:f.k,className:`fbtn${filtro===f.k?" on":""}`,onClick:()=>setFiltro(f.k)},f.l))),
      (filtro==="grupos"||filtro==="amistoso")&&(()=>{
        const jogosOrdenados=[...JOGOS_FG_ATIVOS].sort((a,b)=>a.kickoff-b.kickoff);
        const porDia={};
        jogosOrdenados.forEach(j=>{
          const d=new Date(j.kickoff);
          const chave=`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
          if(!porDia[chave])porDia[chave]={data:d,jogos:[]};
          porDia[chave].jogos.push(j);
        });
        const dias=Object.values(porDia).sort((a,b)=>a.data-b.data);
        const meses=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
        const semana=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
        return dias.map((dia,i)=>
          e("div",{key:i,style:{marginBottom:18}},
            e("div",{className:"fhd",style:{background:"rgba(255,255,255,.08)"}},
              e("h3",null,`${semana[dia.data.getDay()]}, ${dia.data.getDate()} ${meses[dia.data.getMonth()].toUpperCase()}`)
            ),
            dia.jogos.map(j=>e(JogoCard,{key:j.id,jogo:j,user,groupId:group.id,palpites,results,now}))
          )
        );
      })(),
      filtro!=="grupos"&&filtro!=="amistoso"&&(()=>{
        const jf=JOGOS_MM_ATIVOS.filter(j=>j.fase===filtro);
        if(!jf.length)return e("div",{className:"empty"},e("p",null,"Nenhum jogo nesta fase ainda."));
        return e("div",{style:{marginBottom:18}},
          e("div",{className:"fhd",style:{background:filtro==="final"?"var(--az)":"var(--vd)"}},e("h3",null,FASE_LABELS[filtro])),
          jf.map(j=>e(JogoCard,{key:j.id,jogo:j,user,groupId:group.id,palpites,results,now}))
        );
      })()
    )
  );
}

// ════════════════════════════════════════════════════════════════════════════
// AO VIVO SCREEN
// ════════════════════════════════════════════════════════════════════════════
function AoVivoScreen({user,group,palpites,results}){
  const [now,setNow]=useState(Date.now());
  useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),10000);return()=>clearInterval(t);},[]);
  const isAmistosos = group.tipo === "amistosos";

// ════════════════════════════════════════════════════════════════════════════
function EspeciaisScreen({user,group,especiais,gabarito}){
  const now=Date.now(),aberto=now<DEADLINE_COPA;
  const prazoStr=new Date(DEADLINE_COPA).toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"});
  const myEsp=PERGUNTAS.map(p=>({...p,resp:especiais.find(e=>e.userId===user.uid&&e.pergId===p.id)?.resposta||null}));
  const respondidas=myEsp.filter(p=>p.resp).length;
  const [toast,setToast]=useState(null);
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(null),2000)};

  const select=async(pid,o)=>{
    if(!aberto)return;
    try{await fbSaveEspecial(user.uid,group.id,pid,o);showToast("Resposta salva!");}
    catch(e){console.error(e);}
  };
  const e=React.createElement;
  return e("div",{style:{flex:1,overflowY:"auto",paddingBottom:80}},
    e("div",{style:{background:"var(--az)",padding:"12px 14px 14px"}},

      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:8}},
        e("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:"#fff",lineHeight:1}},`${respondidas}`,e("span",{style:{fontSize:14,color:"rgba(255,255,255,.5)"}},`/${PERGUNTAS.length}`)),

      ),
      e("div",{className:"pbar",style:{background:"rgba(255,255,255,.2)"}},e("div",{className:"pfill",style:{background:"var(--am)",width:`${Math.round((respondidas/PERGUNTAS.length)*100)}%`}}))

      myEsp.map((p,i)=>{
        const correto=gabarito[p.id],isC=p.resp&&correto&&p.resp===correto,isE=p.resp&&correto&&p.resp!==correto;
        return e("div",{key:p.id,className:"eq"},
          e("div",{className:"eq-h"},
            e("div",{className:"eq-n"},i+1),
            e("div",{style:{flex:1}},e("div",{className:"eq-t"},p.txt),e("div",{className:"eq-p"},"⭐ 20 pts · ",(correto?"Gabarito definido":"Aguardando gabarito"))),
            isC&&e("div",{style:{fontSize:20,marginLeft:8,flexShrink:0}},"✅"),
            isE&&e("div",{style:{fontSize:20,marginLeft:8,flexShrink:0}},"❌")
          ),
          e("div",{className:"eq-o"},p.opcoes.map(o=>{
            let cls="opbtn";
            if(correto){cls+=correto===o?" correto":p.resp===o?" errado":"";}
            else if(p.resp===o)cls+=" on";
            return e("button",{key:o,className:cls,onClick:()=>select(p.id,o),disabled:!aberto},

            );

        );
      })
    ),
    toast&&e(Toast,{msg:toast})
  );
}

// PERFIL SCREEN
// ════════════════════════════════════════════════════════════════════════════
function PerfilScreen({memberId,group,currentUserId,palpites,results,especiais,gabarito,onBack}){
  const member=group.members.find(m=>m.userId===memberId);
  const isMe=memberId===currentUserId;
  const e=React.createElement;

  const stats=useMemo(()=>{
    let exatos=0,venc=0,erros=0,ptsFG=0,ptsMM=0,ptsEsp=0,palp=0;
    const hist=[];
    TODOS_JOGOS.forEach(j=>{
      const p=palpites.find(pp=>pp.userId===memberId&&pp.jogoId===j.id);
      const r=results[j.id];
      if(!r)return;
      const pts=p?calcPts(p,r):0;
      if(p)palp++;
      if(pts===7)exatos++;else if(pts===2)venc++;else if(pts===0&&p)erros++;
      if(j.fase==="grupos")ptsFG+=pts||0;else ptsMM+=pts||0;
      hist.push({jogoId:j.id,jogo:j,palpite:p||null,resultado:r,pts:pts||0});
    });
    PERGUNTAS.forEach(p=>{
      const ee=especiais.find(x=>x.userId===memberId&&x.pergId===p.id);
      if(ee&&gabarito[p.id]&&ee.resposta===gabarito[p.id])ptsEsp+=20;
    });
    const jogosComRes=Object.keys(results).length;
    const aprov=jogosComRes>0?Math.round(((exatos*7+venc*2)/(jogosComRes*7))*100):0;
    return{exatos,venc,erros,ptsFG,ptsMM,ptsEsp,palp,aprov,hist,total:ptsFG+ptsMM+ptsEsp};
  },[memberId,palpites,results,especiais,gabarito]);

  if(!member) return null;

  return e("div",{style:{flex:1,overflowY:"auto",paddingBottom:80}},
    e("div",{style:{background:"var(--vd)",padding:"20px 14px 16px"}},
      e("button",{onClick:onBack,style:{display:"flex",alignItems:"center",gap:6,color:"rgba(255,255,255,.8)",background:"none",border:"none",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,marginBottom:12}},
        e("svg",{width:14,height:14,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:"2.5"},e("path",{d:"M19 12H5M12 5l-7 7 7 7"})),
        "Ranking"
      ),
      e("div",{style:{display:"flex",alignItems:"center",gap:14}},
        e("div",{style:{width:64,height:64,borderRadius:"50%",background:isMe?"var(--am)":"rgba(255,255,255,.2)",color:isMe?"var(--vde)":"#fff",fontWeight:700,fontSize:26,display:"flex",alignItems:"center",justifyContent:"center",border:"3px solid rgba(255,255,255,.3)",flexShrink:0}},member.apelido[0].toUpperCase()),

          e("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:"#fff",letterSpacing:1,lineHeight:1}},member.apelido,isMe&&" 👤"),

// ADMIN PANEL

function AdminPanel({user,group,results,gabarito}){
  const [tab,setTab]=useState("resultados");
  const [filtro,setFiltro]=useState("grupos");
  const [syncing,setSyncing]=useState(false);
  const [syncMsg,setSyncMsg]=useState(null);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem("bce_api_key")||"");
  const [toast,setToast]=useState(null);
  const [,refresh]=useState(0);
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(null),2200)};

  const handleSync=async()=>{
    const key=localStorage.getItem("bce_api_key")||"";
    if(!key){setSyncMsg({t:"err",m:"Configure sua chave da API."});return;}
    setSyncing(true);setSyncMsg(null);
    try{
      const r=await fetch(`https://api.football-data.org/v4/competitions/WC/matches?season=2026&status=FINISHED`,{headers:{"X-Auth-Token":key}});
      if(r.status===429){setSyncMsg({t:"err",m:"Limite de requisições atingido."});setSyncing(false);return;}
      if(!r.ok){setSyncMsg({t:"err",m:`Erro API: ${r.status}`});setSyncing(false);return;}
      const data=await r.json();
      const FD_MAP={"Mexico":"México","United States":"EUA","Uruguay":"Uruguai","Algeria":"Argélia","Brazil":"Brasil","Japan":"Japão","Spain":"Espanha","Morocco":"Marrocos","France":"França","Germany":"Alemanha","Australia":"Austrália","Saudi Arabia":"Arábia Saudita","England":"Inglaterra","Portugal":"Portugal","Iran":"Irã","Ecuador":"Equador","Argentina":"Argentina","Netherlands":"Holanda","Senegal":"Senegal","Poland":"Polônia","Italy":"Itália","Croatia":"Croácia","Canada":"Canadá","Peru":"Peru","Belgium":"Bélgica","Turkey":"Turquia","Chile":"Chile","Ukraine":"Ucrânia","Korea Republic":"Coreia do Sul","Colombia":"Colômbia","Costa Rica":"Costa Rica","South Africa":"África do Sul","Switzerland":"Suíça","Denmark":"Dinamarca","New Zealand":"Nova Zelândia","Togo":"Togo","Serbia":"Sérvia","Egypt":"Egito","Venezuela":"Venezuela","Ivory Coast":"Costa do Marfim","Cameroon":"Camarões","Romania":"Romênia","Guatemala":"Guatemala","Qatar":"Qatar","Nigeria":"Nigéria","Russia":"Rússia","Bolivia":"Bolívia","Albania":"Albânia"};
      let count=0;
      for(const m of(data.matches||[])){
        if(m.status!=="FINISHED")continue;
        const h=FD_MAP[m.homeTeam?.name]||m.homeTeam?.name||"",a=FD_MAP[m.awayTeam?.name]||m.awayTeam?.name||"",ft=m.score?.fullTime;
        if(!ft||ft.home==null)continue;
        const j=TODOS_JOGOS.find(j=>(j.casa===h&&j.fora===a)||(j.casa===a&&j.fora===h));
        if(!j)continue;
        const sw=j.casa===a;
        await fbSetResult(group.id,j.id,sw?ft.away:ft.home,sw?ft.home:ft.away,"final");
        count++;
      }
      setSyncMsg({t:"ok",m:`✓ ${count} resultado${count!==1?"s":""} importado${count!==1?"s":""}!`});
    }catch(ex){setSyncMsg({t:"err",m:"Erro de conexão com a API."});}
    setSyncing(false);
  };

  const e=React.createElement;

  function ManualRow({jogo}){
    const r=results[jogo.id];
    const [ca,setCa]=useState(r!=null?String(r.casa):"");
    const [fo,setFo]=useState(r!=null?String(r.fora):"");
    const [st,setSt]=useState(r?.status||"final");
    const [editing,setEditing]=useState(!r);
    const [busy,setBusy]=useState(false);
    const save=async()=>{
      if(ca.length<1||fo.length<1||isNaN(+ca)||isNaN(+fo))return;
      setBusy(true);
      try{await fbSetResult(group.id,jogo.id,+ca,+fo,st);setEditing(false);showToast(`✓ ${jogo.casa} ${ca}×${fo} ${jogo.fora}`);}
      catch(ex){showToast("Erro ao salvar resultado.");}
      setBusy(false);
    };
    const del=async()=>{
      try{await fbDeleteResult(group.id,jogo.id);setCa("");setFo("");setEditing(true);showToast("Resultado removido.");}
      catch(ex){showToast("Erro ao remover.");}
    };
    const dt=new Date(jogo.kickoff).toLocaleDateString("pt-BR",{day:"2-digit",month:"short",timeZone:"America/Sao_Paulo"});
    return e("div",{className:`admin-row${r?" has-r":""}` },
      e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:6}},
        e("div",null,
          e("div",{style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:700}},`${FLAGS[jogo.casa]||"🏳️"} ${jogo.casa} × ${jogo.fora} ${FLAGS[jogo.fora]||"🏳️"}`),
          e("div",{style:{fontSize:11,color:"#999"}},(jogo.grupo?"Grupo "+jogo.grupo+"·R"+jogo.rodada:jogo.label)+" · "+dt)
        ),
        r&&!editing&&e("div",{style:{display:"flex",alignItems:"center",gap:8}},
          e("span",{className:"res-badge"},`${r.casa}–${r.fora}`),
          e("span",{style:{fontSize:11,background:r.status==="live"?"#ffebee":"#e8f5e9",color:r.status==="live"?"#c62828":"#2e7d32",borderRadius:6,padding:"2px 6px",fontWeight:700}},r.status==="live"?"⚡ LIVE":"✓ FINAL")
        )
      ),
      editing?e("div",{style:{marginTop:10}},
        e("div",{className:"res-inputs"},
          e("input",{className:"res-input",type:"number",min:0,max:20,value:ca,onChange:ev=>setCa(ev.target.value),placeholder:"0"}),
          e("span",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:"#ccc"}},"×"),
          e("input",{className:"res-input",type:"number",min:0,max:20,value:fo,onChange:ev=>setFo(ev.target.value),placeholder:"0"}),
          e("select",{value:st,onChange:ev=>setSt(ev.target.value),style:{padding:"8px 10px",border:"1.5px solid var(--cb)",borderRadius:8,fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,color:"#333",outline:"none"}},
            e("option",{value:"live"},"⚡ Ao Vivo"),
            e("option",{value:"final"},"✓ Final")
          )
        ),
        e("div",{style:{display:"flex",gap:8,marginTop:10}},
          e("button",{className:"btn-sm",onClick:save,disabled:busy||ca.length<1||fo.length<1},busy?"...":"SALVAR"),
          r&&e("button",{className:"btn-sm-gray",onClick:()=>{setCa(String(r.casa));setFo(String(r.fora));setEditing(false)}},"CANCELAR")
        )
      ):e("div",{style:{display:"flex",gap:8,marginTop:8}},
        e("button",{className:"btn-sm-gray",onClick:()=>setEditing(true)},"✏️ Editar"),
        e("button",{className:"btn-sm-red",onClick:del},"🗑 Remover")
      )
    );
  }

  function GabRow({perg,idx}){
    const cur=gabarito[perg.id];
    return e("div",{style:{background:"#fff",borderRadius:"var(--rs)",padding:"14px",marginBottom:10,border:"1.5px solid var(--cb)"}},
      e("div",{style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,color:"var(--az)",marginBottom:8}},`P${idx+1}. ${perg.txt}`),
      e("div",{style:{display:"flex",flexDirection:"column",gap:6}},
        perg.opcoes.map(o=>e("button",{key:o,onClick:async()=>{await fbSetGabarito(group.id,perg.id,o);showToast("Gabarito salvo!");},style:{padding:"8px 12px",border:`1.5px solid ${cur===o?"var(--vd)":"var(--cb)"}`,borderRadius:8,background:cur===o?"#e8f5e9":"#fff",color:cur===o?"var(--vde)":"#333",fontFamily:"'Barlow',sans-serif",fontSize:14,fontWeight:cur===o?700:400,cursor:"pointer",textAlign:"left",transition:"all .15s"}},cur===o?"✓ ":"",o))
      )
    );
  }

  const jogosShow=filtro==="grupos"?JOGOS_FG:JOGOS_MM.filter(j=>j.fase===filtro);
  const FILTROS=[{k:"grupos",l:"Grupos"},{k:"oitavas",l:"Oitavas"},{k:"quartas",l:"Quartas"},{k:"semifinais",l:"Semis"},{k:"terceiro",l:"3º"},{k:"final",l:"Final"}];

  return e("div",{style:{flex:1,overflowY:"auto",paddingBottom:80}},
    e("div",{className:"admin-h"},
      e("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"var(--am)",letterSpacing:1}},"🛡️ PAINEL DO ADMINISTRADOR"),
      e("div",{style:{fontSize:12,color:"rgba(255,255,255,.7)"}},"Acesso exclusivo do criador")
    ),
    e("div",{style:{background:"var(--az)",padding:"0 14px",display:"flex",gap:0,borderBottom:"1px solid rgba(255,255,255,.15)"}},
      [["resultados","📋 Resultados"],["api","🌐 API"],["especiais","⭐ Especiais"]].map(([k,l])=>
        e("button",{key:k,className:`gn-btn${tab===k?" on":""}`,onClick:()=>setTab(k)},l)
      )
    ),
    e("div",{style:{padding:"14px"}},
      tab==="resultados"&&e("div",null,
        e("div",{className:"warn-box",style:{marginBottom:14}},"📋 Inserir resultado recalcula os pontos de todos automaticamente."),
        e("div",{className:"fbar"},FILTROS.map(f=>e("button",{key:f.k,className:`fbtn${filtro===f.k?" on":""}`,onClick:()=>setFiltro(f.k)},f.l))),
        jogosShow.map(j=>e(ManualRow,{key:j.id,jogo:j}))
      ),
      tab==="api"&&e("div",null,
        e("div",{className:"info-box",style:{marginBottom:16}},"🌐 Use a API gratuita ",e("strong",null,"football-data.org")," para importar resultados automaticamente."),
        e("div",{className:"fg"},
          e("label",{className:"fl"},"SUA API KEY"),
          e("div",{style:{display:"flex",gap:8}},
            e("input",{className:"fi",type:"text",placeholder:"Cole sua chave aqui...",value:apiKey,onChange:ev=>setApiKey(ev.target.value),style:{fontFamily:"monospace",fontSize:13}}),
            e("button",{className:"btn-sm",onClick:()=>{localStorage.setItem("bce_api_key",apiKey.trim());showToast("Chave salva!")},style:{flexShrink:0}},"SALVAR")
          )
        ),
        e("button",{className:"btn-p",onClick:handleSync,disabled:syncing,style:{marginBottom:14}},syncing?"🔄 SINCRONIZANDO...":"🔄 SINCRONIZAR AGORA"),
        syncMsg&&e("div",{className:syncMsg.t==="err"?"err-box":"ok-box",style:{marginBottom:14}},syncMsg.m)
      ),
      tab==="especiais"&&e("div",null,
        e("div",{className:"warn-box",style:{marginBottom:14}},"⭐ Defina as respostas corretas. Os 20pts são atribuídos automaticamente."),
        PERGUNTAS.map((p,i)=>e(GabRow,{key:p.id,perg:p,idx:i}))
      )
    ),
    toast&&e(Toast,{msg:toast})
  );
}

// GROUP VIEW  — tabbed shell with real-time Firebase listeners
// ════════════════════════════════════════════════════════════════════════════
function GroupView({groupId,user,onBack}){
  const group    = useGroup(groupId);
  const palpites = useGroupPalpites(groupId);
  const results  = useGroupResults(groupId);
  const especiais= useGroupEspeciais(groupId);
  const gabarito = useGabarito(groupId);
  const [tab,setTab]       = useState("jogos");
  const [perfilId,setPerfilId] = useState(null);
  const syncRef = useRef(null);
  const e = React.createElement;

  // Auto-sync football-data.org every 5 min
  useEffect(()=>{
    if(!group) return;
    const isAdmin=group.ownerId===user.uid;
    if(!isAdmin) return;
    const doSync=async()=>{
      const key=localStorage.getItem("bce_api_key")||"";
      if(!key) return;
      try{
        const r=await fetch("https://api.football-data.org/v4/competitions/WC/matches?season=2026&status=FINISHED",{headers:{"X-Auth-Token":key}});
        if(!r.ok) return;
        const data=await r.json();
        const FD_MAP={"Mexico":"México","United States":"EUA","Uruguay":"Uruguai","Algeria":"Argélia","Brazil":"Brasil","Japan":"Japão","Spain":"Espanha","Morocco":"Marrocos","France":"França","Germany":"Alemanha","Australia":"Austrália","Saudi Arabia":"Arábia Saudita","England":"Inglaterra","Portugal":"Portugal","Iran":"Irã","Ecuador":"Equador","Argentina":"Argentina","Netherlands":"Holanda","Senegal":"Senegal","Poland":"Polônia","Italy":"Itália","Croatia":"Croácia","Canada":"Canadá","Peru":"Peru","Belgium":"Bélgica","Turkey":"Turquia","Chile":"Chile","Ukraine":"Ucrânia","Korea Republic":"Coreia do Sul","Colombia":"Colômbia","Costa Rica":"Costa Rica","South Africa":"África do Sul","Switzerland":"Suíça","Denmark":"Dinamarca","New Zealand":"Nova Zelândia","Togo":"Togo","Serbia":"Sérvia","Egypt":"Egito","Venezuela":"Venezuela","Ivory Coast":"Costa do Marfim","Cameroon":"Camarões","Romania":"Romênia","Guatemala":"Guatemala","Qatar":"Qatar","Nigeria":"Nigéria","Russia":"Rússia","Bolivia":"Bolívia","Albania":"Albânia"};
        for(const m of(data.matches||[])){
          if(m.status!=="FINISHED") continue;
          const h=FD_MAP[m.homeTeam?.name]||"",a=FD_MAP[m.awayTeam?.name]||"",ft=m.score?.fullTime;
          if(!ft||ft.home==null) continue;
          const j=TODOS_JOGOS.find(j=>(j.casa===h&&j.fora===a)||(j.casa===a&&j.fora===h));
          if(!j) continue;
          const sw=j.casa===a;
          await fbSetResult(groupId,j.id,sw?ft.away:ft.home,sw?ft.home:ft.away,"final");
        }
      }catch{}
    };
    doSync();
    syncRef.current=setInterval(doSync,5*60*1000);
    return()=>clearInterval(syncRef.current);
  },[group?.ownerId]);

  if(!group) return e("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",flex:1,padding:40}},
    e("div",{style:{textAlign:"center"}},
      e("div",{className:"splash-spin",style:{margin:"0 auto 16px",borderTopColor:"var(--vd)"}}),
      e("div",{style:{color:"#999",fontSize:14}},"Carregando bolão...")
    )
  );

  const isAdmin=group.ownerId===user.uid;

  if(perfilId) return e("div",{style:{display:"flex",flexDirection:"column",flex:1}},
    e(PerfilScreen,{memberId:perfilId,group,currentUserId:user.uid,palpites,results,especiais,gabarito,onBack:()=>setPerfilId(null)})
  );

  const TABS=[
    {k:"jogos",l:"⚽ Jogos"},
    {k:"aovivo",l:"🔴 Ao Vivo"},
    {k:"especiais",l:"⭐ Especiais"},
    {k:"ranking",l:"🏆 Ranking"},
  ];
  if(group.financeConfig) TABS.push({k:"financeiro",l:"💰 Financeiro"});
  if(isAdmin) TABS.push({k:"admin",l:"🛡️ Admin"});

  return e("div",{style:{display:"flex",flexDirection:"column",flex:1}},
    e("div",{className:"hd"},
      e("div",{className:"logo"},
        e("span",null,"⚽"),
        e("div",null,
          e("div",{style:{fontSize:18}},"BOLÃO"),
          e("span",{className:"logo-sub"},"COPA 2026")
        )
      ),
      e("div",{className:"av-sm"},user.displayName?.[0]?.toUpperCase()||"?")
    ),
    e("div",{style:{background:"var(--vd)",padding:"0 14px",flexShrink:0}},
      e("button",{className:"back-btn",onClick:onBack},
        e("svg",{width:14,height:14,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:"2.5"},e("path",{d:"M19 12H5M12 5l-7 7 7 7"})),
        " Meus bolões"
      ),
      e("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"#fff",letterSpacing:1,padding:"4px 0 10px",display:"flex",alignItems:"center",gap:8}},
        group.nome,
        isAdmin&&e("span",{style:{background:"var(--am)",color:"var(--vde)",fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20,letterSpacing:1}},"ADM")
      ),
      e("div",{className:"gn-bar"},
        TABS.map(t=>e("button",{key:t.k,className:`gn-btn${tab===t.k?" on":""}`,onClick:()=>setTab(t.k)},t.l))
      )
    ),
    tab==="jogos"      && e(JogosScreen,{user,group,palpites,results}),
    tab==="aovivo"     && e(AoVivoScreen,{user,group,palpites,results}),
    tab==="especiais"  && e(EspeciaisScreen,{user,group,especiais,gabarito}),
    tab==="ranking"    && e(RankingScreen,{user,group,palpites,results,especiais,gabarito,onOpenPerfil:setPerfilId}),
    tab==="financeiro" && e(FinanceScreen,{user,group,palpites,results,especiais,gabarito}),
    tab==="admin" && isAdmin && e(AdminPanel,{user,group,results,gabarito})
  );
}

// ROOT APP
// ════════════════════════════════════════════════════════════════════════════
function App(){
  const [user,setUser] = useState(undefined); // undefined = loading
  const e = React.createElement;

  useEffect(()=>{
    const unsub = onAuthStateChanged(auth, u=>{
      setUser(u||null);
      // Hide splash after auth resolves
      setTimeout(()=>{
        const splash=document.getElementById("splash");
        if(splash){splash.classList.add("hide");setTimeout(()=>splash.remove(),500);}
      },300);
    });
    return unsub;
  },[]);

  if(user===undefined) return null; // Splash is showing

  return e("div",{id:"app-inner",style:{display:"flex",flexDirection:"column",flex:1}},
    user ? e(Dashboard,{user}) : e(AuthScreen,{onLogin:setUser})
  );
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").then(reg => {
      console.log("SW registered:", reg.scope);
    }).catch(err => {
      console.log("SW registration failed:", err);
    });
  });
}

// ── PWA Install Prompt ────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", ev => {
  ev.preventDefault();
  deferredPrompt = ev;
  // Show install button
  const btn = document.getElementById("install-btn");
  if (btn) btn.style.display = "flex";
});
window.addEventListener("appinstalled", () => {
  const btn = document.getElementById("install-btn");
  if (btn) btn.remove();
  deferredPrompt = null;
});
window.handleInstall = function() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
};

// Mount
const root = createRoot(document.getElementById("root"));
root.render(React.createElement(App));
